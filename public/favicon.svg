<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A2E" />
      <stop offset="100%" stop-color="#0F3460" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E94560" />
      <stop offset="100%" stop-color="#FF5C77" />
    </linearGradient>
  </defs>
  
  <!-- Professional circular background -->
  <circle cx="60" cy="60" r="60" fill="url(#bg)" />
  
  <!-- Sleek, balanced Code (<) + Start (▶) icon -->
  <!-- Left Bracket "<" -->
  <path d="M 54 38 L 34 60 L 54 82" fill="none" stroke="url(#primary)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Play Button "▶" -->
  <path d="M 64 37 L 88 60 L 64 83 Z" fill="url(#primary)" stroke="url(#primary)" stroke-width="2" stroke-linejoin="round" />
</svg>
